name: Notify Homebrew tap

# On every pushed v* tag, tell the Homebrew tap to bump its formula.
#
# OPTIONAL: this only matters for tags created OUTSIDE release.sh (e.g. via the
# GitHub UI). release.sh already triggers the tap directly with your local gh
# auth, so the common path needs no secret.
# To enable this fallback, create a fine-grained PAT with "Contents: write" on
# frontmatters/homebrew-secrets-helper and add it as the repo secret
# TAP_DISPATCH_TOKEN. Without the secret the job is a no-op (the tap also
# self-syncs daily), so it never fails red.

on:
  push:
    tags:
      - "v*"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tap formula bump
        env:
          TAP_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "TAP_DISPATCH_TOKEN not set — skipping (release.sh triggers the tap directly; daily schedule is the fallback)."
            exit 0
          fi
          version="${TAG#v}"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${TAP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/frontmatters/homebrew-secrets-helper/dispatches \
            -d "{\"event_type\":\"secrets-helper-release\",\"client_payload\":{\"version\":\"${version}\"}}"
